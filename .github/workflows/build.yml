name: Build Application

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  server:
    name: Server — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
        working-directory: server
      - name: Syntax check
        run: for f in $(find . -name '*.js' -not -path './node_modules/*'); do node -c "$f" || exit 1; done
        working-directory: server

  client:
    name: Client — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
        working-directory: client
      - name: Build
        run: npm run build
        working-directory: client
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build/
          retention-days: 7

  plugins:
    name: Plugins — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate all .plugram files
        run: |
          for f in plugins/*.plugram; do
            [ -f "$f" ] || continue
            NAME=$(grep '^__name__:' "$f" | head -1 | cut -d: -f2- | xargs)
            ID=$(grep '^__id__:' "$f" | head -1 | cut -d: -f2- | xargs)
            VER=$(grep '^__version__:' "$f" | head -1 | cut -d: -f2- | xargs)
            if [ -z "$NAME" ]; then echo "ERROR: $f missing __name__"; exit 1; fi
            if [ -z "$ID" ]; then echo "ERROR: $f missing __id__"; exit 1; fi
            if [ -z "$VER" ]; then echo "ERROR: $f missing __version__"; exit 1; fi
            echo "  ✅ $NAME ($ID v$VER)"
          done
