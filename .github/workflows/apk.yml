name: Build APK (Android)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore Android SDK cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/cache
            ~/.gradle/caches
          key: android-${{ runner.os }}-${{ hashFiles('client/capacitor.config.ts') }}

      - name: Build React PWA
        run: |
          npm install
          npm run build
        working-directory: client

      - name: Generate Android project (Capacitor)
        run: |
          npx cap add android
          npx cap copy android
          npx cap sync android
        working-directory: client

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        working-directory: client

      - name: Locate and rename APK
        run: |
          APK=$(find client/android -name "app-debug.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            TAG="${{ github.ref_name }}"
            NAME="Plugram-${TAG:-latest}.apk"
            mv "$APK" "$NAME"
            echo "✅ APK: $NAME ($(du -h "$NAME" | cut -f1))"
          else
            echo "❌ APK not found!"
            find client/android -name "*.apk" 2>/dev/null || true
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugram-android-apk
          path: Plugram-*.apk
          retention-days: 90

      - name: Attach APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Plugram-*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
