name: Build APK (Android)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build React app
        run: |
          npm install
          npm run build
        working-directory: client

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli@latest
          cd client/build
          npm init -y
          npm install @capacitor/core @capacitor/android

      - name: Init Capacitor Android project
        run: |
          cd client/build
          npx cap init --webDir . Plugram com.plugram.app --yes
          npx cap add android

      - name: Copy web build to Android
        run: |
          cd client/build
          npx cap copy android

      - name: Build APK (debug)
        run: |
          cd client/build/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv client/build/android/app/build/outputs/apk/debug/app-debug.apk \
             Plugram-v${{ github.ref_name }}.apk 2>/dev/null || \
          mv client/build/android/app/build/outputs/apk/debug/app-debug.apk \
             Plugram-latest.apk 2>/dev/null || true

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugram-apk
          path: Plugram-*.apk
          retention-days: 90

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Plugram-*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
